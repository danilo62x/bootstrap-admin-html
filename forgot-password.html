<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <title>Esqueci a senha — Admin Template</title>

  <link rel="stylesheet" href="assets/css/app.css" />
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/state.js"></script>
  <script src="assets/js/auth.js"></script>
  <script src="assets/js/icons.js"></script>
  <script src="assets/js/pwa.js"></script>
</head>
<body>
  <div class="relative flex min-h-screen items-center justify-center bg-gradient-to-br from-brand-50 via-white to-brand-100 px-4 py-10 dark:from-gray-900 dark:via-gray-dark dark:to-gray-900">
    <div class="absolute inset-0 -z-10 overflow-hidden">
      <div class="absolute -top-32 -right-32 h-96 w-96 rounded-full bg-brand-200/40 blur-3xl dark:bg-brand-500/10"></div>
      <div class="absolute -bottom-32 -left-32 h-96 w-96 rounded-full bg-warning-100/60 blur-3xl dark:bg-brand-700/10"></div>
    </div>

    <div class="w-full max-w-md">
      <div class="mb-6 flex flex-col items-center">
        <span class="flex h-14 w-14 items-center justify-center rounded-2xl bg-brand-500 text-white shadow-theme-md">
          <span id="ic-lock"></span>
        </span>
        <h1 class="mt-5 text-title-sm font-bold text-heading">Esqueci a senha</h1>
        <p class="mt-2 text-center text-sm text-muted">Informe seu e-mail e enviaremos um link para redefinir sua senha.</p>
      </div>

      <div class="surface-card rounded-2xl border p-6 shadow-theme-lg md:p-8">
        <form id="forgot-form" class="space-y-5" novalidate>
          <div>
            <label class="mb-2 block text-sm font-medium text-heading" for="email">E-mail</label>
            <div class="relative">
              <span id="ic-mail" class="pointer-events-none absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></span>
              <input id="email" type="email" autocomplete="email" placeholder="seu@email.com" class="h-11 w-full rounded-lg border border-themed bg-gray-50 pl-10 pr-3 text-sm text-body placeholder-gray-400 outline-none focus:border-brand-300 dark:bg-gray-900" />
            </div>
            <p data-error="email" class="mt-1.5 hidden text-xs text-error-500"></p>
          </div>

          <button id="submit-btn" type="submit" class="btn btn-brand flex h-11 w-full items-center justify-center rounded-lg bg-brand-500 text-sm font-medium text-white shadow-theme-xs transition hover:bg-brand-600 focus-ring disabled:cursor-not-allowed disabled:opacity-60">Enviar link de redefinição</button>
        </form>

        <div id="success-state" class="hidden flex-col items-center text-center">
          <span class="flex h-14 w-14 items-center justify-center rounded-full bg-success-50 text-success-500 dark:bg-success-500/15">
            <span id="ic-check"></span>
          </span>
          <h2 class="mt-4 text-base font-semibold text-heading">Link enviado para seu e-mail</h2>
          <p class="mt-2 text-sm text-muted">
            Enviamos um link de redefinição para
            <span id="sent-to" class="font-medium text-body"></span>. Verifique sua caixa de entrada e o spam.
          </p>
          <div class="mt-4 w-full rounded-lg border border-dashed border-themed bg-gray-50/60 p-3 text-xs text-muted dark:bg-gray-900/40">
            Não recebeu?
            <button type="button" id="retry-btn" class="font-medium text-brand-500 hover:text-brand-600">Tentar outro e-mail</button>
          </div>
        </div>
      </div>

      <p class="mt-6 text-center text-sm text-muted">
        <a href="login.html" class="font-medium text-brand-500 hover:text-brand-600">Voltar — Entrar</a>
      </p>
    </div>
  </div>

  <script>
    document.getElementById('ic-lock').innerHTML = icon('lock', { size: 26 });
    document.getElementById('ic-mail').innerHTML = icon('mail', { size: 18 });
    document.getElementById('ic-check').innerHTML = icon('check', { size: 28 });

    const form = document.getElementById('forgot-form');
    const successState = document.getElementById('success-state');

    function setError(field, msg) {
      const el = document.querySelector(`[data-error="${field}"]`);
      if (!el) return;
      if (msg) { el.textContent = msg; el.classList.remove('hidden'); }
      else { el.textContent = ''; el.classList.add('hidden'); }
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();

      if (!email) { setError('email', 'Informe seu e-mail'); return; }
      if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { setError('email', 'E-mail inválido'); return; }
      setError('email', null);

      const btn = document.getElementById('submit-btn');
      btn.disabled = true;
      btn.innerHTML = '<span class="flex items-center gap-2"><span class="h-4 w-4 animate-spin rounded-full border-2 border-white/30 border-t-white"></span>Enviando...</span>';

      await new Promise((r) => setTimeout(r, 700));

      document.getElementById('sent-to').textContent = email;
      form.classList.add('hidden');
      successState.classList.remove('hidden');
      successState.classList.add('flex');
    });

    document.getElementById('retry-btn').addEventListener('click', () => {
      successState.classList.add('hidden');
      successState.classList.remove('flex');
      form.classList.remove('hidden');
      const btn = document.getElementById('submit-btn');
      btn.disabled = false;
      btn.textContent = 'Enviar link de redefinição';
      document.getElementById('email').value = '';
    });
  </script>
</body>
</html>
