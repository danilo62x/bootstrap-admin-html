<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <title>Criar conta — Admin Template</title>

  <link rel="stylesheet" href="assets/css/app.css" />
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/state.js"></script>
  <script src="assets/js/auth.js"></script>
  <script src="assets/js/icons.js"></script>
  <script src="assets/js/pwa.js"></script>
</head>
<body>
  <div class="relative flex min-h-screen items-center justify-center bg-gradient-to-br from-brand-50 via-white to-brand-100 px-4 py-10 dark:from-gray-900 dark:via-gray-dark dark:to-gray-900">
    <div class="absolute inset-0 -z-10 overflow-hidden">
      <div class="absolute -top-32 -right-32 h-96 w-96 rounded-full bg-brand-200/40 blur-3xl dark:bg-brand-500/10"></div>
      <div class="absolute -bottom-32 -left-32 h-96 w-96 rounded-full bg-warning-100/60 blur-3xl dark:bg-brand-700/10"></div>
    </div>

    <div class="w-full max-w-md">
      <div class="mb-6 flex flex-col items-center">
        <span class="flex h-14 w-14 items-center justify-center rounded-2xl bg-brand-500 text-white shadow-theme-md">
          <span class="text-2xl font-bold">A</span>
        </span>
        <h1 class="mt-5 text-title-sm font-bold text-heading">Criar conta</h1>
        <p class="mt-2 text-sm text-muted">Preencha os dados para começar</p>
      </div>

      <div class="surface-card rounded-2xl border p-6 shadow-theme-lg md:p-8">
        <form id="register-form" class="space-y-5" novalidate>
          <div>
            <label class="mb-2 block text-sm font-medium text-heading" for="name">Nome</label>
            <div class="relative">
              <span id="ic-user" class="pointer-events-none absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></span>
              <input id="name" type="text" autocomplete="name" placeholder="Seu nome completo" class="h-11 w-full rounded-lg border border-themed bg-gray-50 pl-10 pr-3 text-sm text-body placeholder-gray-400 outline-none focus:border-brand-300 dark:bg-gray-900" />
            </div>
            <p data-error="name" class="mt-1.5 hidden text-xs text-error-500"></p>
          </div>

          <div>
            <label class="mb-2 block text-sm font-medium text-heading" for="email">E-mail</label>
            <div class="relative">
              <span id="ic-mail" class="pointer-events-none absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></span>
              <input id="email" type="email" autocomplete="email" placeholder="seu@email.com" class="h-11 w-full rounded-lg border border-themed bg-gray-50 pl-10 pr-3 text-sm text-body placeholder-gray-400 outline-none focus:border-brand-300 dark:bg-gray-900" />
            </div>
            <p data-error="email" class="mt-1.5 hidden text-xs text-error-500"></p>
          </div>

          <div>
            <label class="mb-2 block text-sm font-medium text-heading" for="password">Senha</label>
            <div class="relative">
              <span id="ic-lock" class="pointer-events-none absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></span>
              <input id="password" type="password" autocomplete="new-password" placeholder="••••••••" class="h-11 w-full rounded-lg border border-themed bg-gray-50 pl-10 pr-10 text-sm text-body placeholder-gray-400 outline-none focus:border-brand-300 dark:bg-gray-900" />
              <button type="button" id="toggle-pwd" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 dark:hover:text-gray-200"></button>
            </div>
            <p class="mt-1.5 text-xs text-muted">Mínimo de 8 caracteres</p>
            <p data-error="password" class="mt-1.5 hidden text-xs text-error-500"></p>
          </div>

          <div>
            <label class="mb-2 block text-sm font-medium text-heading" for="confirmPassword">Confirmar senha</label>
            <div class="relative">
              <span id="ic-lock2" class="pointer-events-none absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></span>
              <input id="confirmPassword" type="password" autocomplete="new-password" placeholder="••••••••" class="h-11 w-full rounded-lg border border-themed bg-gray-50 pl-10 pr-3 text-sm text-body placeholder-gray-400 outline-none focus:border-brand-300 dark:bg-gray-900" />
            </div>
            <p data-error="confirmPassword" class="mt-1.5 hidden text-xs text-error-500"></p>
          </div>

          <div class="space-y-1.5">
            <label class="flex items-start gap-2 text-sm text-body">
              <input id="acceptTerms" type="checkbox" class="mt-0.5 h-4 w-4 rounded border-gray-300 text-brand-500 focus:ring-brand-500 dark:border-gray-700 dark:bg-gray-800" />
              Li e aceito os termos de uso e a política de privacidade
            </label>
            <p data-error="acceptTerms" class="hidden text-xs text-error-500"></p>
          </div>

          <button id="submit-btn" type="submit" class="btn btn-brand flex h-11 w-full items-center justify-center rounded-lg bg-brand-500 text-sm font-medium text-white shadow-theme-xs transition hover:bg-brand-600 focus-ring disabled:cursor-not-allowed disabled:opacity-60">Criar conta</button>

          <p id="success-msg" class="hidden rounded-lg bg-success-50 px-4 py-2 text-center text-sm text-success-600 dark:bg-success-500/15 dark:text-success-500">Conta criada com sucesso! Redirecionando...</p>
        </form>
      </div>

      <p class="mt-6 text-center text-sm text-muted">
        Já tem uma conta?
        <a href="login.html" class="font-medium text-brand-500 hover:text-brand-600">Entrar</a>
      </p>
    </div>
  </div>

  <script>
    document.getElementById('ic-user').innerHTML = icon('user', { size: 18 });
    document.getElementById('ic-mail').innerHTML = icon('mail', { size: 18 });
    document.getElementById('ic-lock').innerHTML = icon('lock', { size: 18 });
    document.getElementById('ic-lock2').innerHTML = icon('lock', { size: 18 });
    document.getElementById('toggle-pwd').innerHTML = icon('eye', { size: 18 });

    let showPwd = false;
    document.getElementById('toggle-pwd').addEventListener('click', () => {
      showPwd = !showPwd;
      document.getElementById('password').type = showPwd ? 'text' : 'password';
      document.getElementById('toggle-pwd').innerHTML = icon(showPwd ? 'eye-off' : 'eye', { size: 18 });
    });

    function setError(field, msg) {
      const el = document.querySelector(`[data-error="${field}"]`);
      if (!el) return;
      if (msg) {
        el.textContent = msg;
        el.classList.remove('hidden');
      } else {
        el.textContent = '';
        el.classList.add('hidden');
      }
    }

    function validate() {
      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      const acceptTerms = document.getElementById('acceptTerms').checked;
      let ok = true;

      if (!name) { setError('name', 'Informe seu nome'); ok = false; }
      else setError('name', null);

      if (!email) { setError('email', 'Informe seu e-mail'); ok = false; }
      else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { setError('email', 'E-mail inválido'); ok = false; }
      else setError('email', null);

      if (!password) { setError('password', 'Informe uma senha'); ok = false; }
      else if (password.length < 8) { setError('password', 'A senha deve ter ao menos 8 caracteres'); ok = false; }
      else setError('password', null);

      if (!confirmPassword) { setError('confirmPassword', 'Confirme sua senha'); ok = false; }
      else if (confirmPassword !== password) { setError('confirmPassword', 'As senhas não conferem'); ok = false; }
      else setError('confirmPassword', null);

      if (!acceptTerms) { setError('acceptTerms', 'Você precisa aceitar os termos'); ok = false; }
      else setError('acceptTerms', null);

      return ok;
    }

    document.getElementById('register-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      if (!validate()) return;

      const btn = document.getElementById('submit-btn');
      const success = document.getElementById('success-msg');
      btn.disabled = true;
      btn.innerHTML = '<span class="flex items-center gap-2"><span class="h-4 w-4 animate-spin rounded-full border-2 border-white/30 border-t-white"></span>Criando conta...</span>';

      await new Promise((r) => setTimeout(r, 700));

      success.classList.remove('hidden');
      window.location.href = 'login.html';
    });
  </script>
</body>
</html>
