<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <title>Redefinir senha — Admin Template</title>

  <link rel="stylesheet" href="assets/css/app.css" />
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/state.js"></script>
  <script src="assets/js/auth.js"></script>
  <script src="assets/js/icons.js"></script>
  <script src="assets/js/pwa.js"></script>
</head>
<body>
  <div class="relative flex min-h-screen items-center justify-center bg-gradient-to-br from-brand-50 via-white to-brand-100 px-4 py-10 dark:from-gray-900 dark:via-gray-dark dark:to-gray-900">
    <div class="absolute inset-0 -z-10 overflow-hidden">
      <div class="absolute -top-32 -right-32 h-96 w-96 rounded-full bg-brand-200/40 blur-3xl dark:bg-brand-500/10"></div>
      <div class="absolute -bottom-32 -left-32 h-96 w-96 rounded-full bg-warning-100/60 blur-3xl dark:bg-brand-700/10"></div>
    </div>

    <div class="w-full max-w-md">
      <div class="mb-6 flex flex-col items-center">
        <span class="flex h-14 w-14 items-center justify-center rounded-2xl bg-brand-500 text-white shadow-theme-md">
          <span id="ic-lock"></span>
        </span>
        <h1 class="mt-5 text-title-sm font-bold text-heading">Redefinir senha</h1>
        <p class="mt-2 text-center text-sm text-muted">Defina uma nova senha para sua conta.</p>
      </div>

      <div class="surface-card rounded-2xl border p-6 shadow-theme-lg md:p-8">
        <div id="invalid-token" class="mb-5 hidden rounded-lg bg-warning-50 px-4 py-2 text-center text-sm text-warning-500 dark:bg-warning-500/15">
          Link inválido ou expirado. Solicite um novo link de redefinição.
        </div>

        <form id="reset-form" class="space-y-5" novalidate>
          <div>
            <label class="mb-2 block text-sm font-medium text-heading" for="password">Nova senha</label>
            <div class="relative">
              <span id="ic-lock-pwd" class="pointer-events-none absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></span>
              <input id="password" type="password" autocomplete="new-password" placeholder="••••••••" class="h-11 w-full rounded-lg border border-themed bg-gray-50 pl-10 pr-10 text-sm text-body placeholder-gray-400 outline-none focus:border-brand-300 dark:bg-gray-900" />
              <button type="button" id="toggle-pwd" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 dark:hover:text-gray-200"></button>
            </div>
            <p class="mt-1.5 text-xs text-muted">Use 8+ caracteres, com letras, números e símbolos</p>
            <p data-error="password" class="mt-1.5 hidden text-xs text-error-500"></p>
          </div>

          <div id="strength" class="hidden space-y-1.5">
            <div class="flex gap-1">
              <span data-bar="0" class="h-1.5 flex-1 rounded-full bg-gray-200 transition-colors dark:bg-gray-700"></span>
              <span data-bar="1" class="h-1.5 flex-1 rounded-full bg-gray-200 transition-colors dark:bg-gray-700"></span>
              <span data-bar="2" class="h-1.5 flex-1 rounded-full bg-gray-200 transition-colors dark:bg-gray-700"></span>
              <span data-bar="3" class="h-1.5 flex-1 rounded-full bg-gray-200 transition-colors dark:bg-gray-700"></span>
            </div>
            <p id="strength-label" class="text-xs font-medium"></p>
          </div>

          <div>
            <label class="mb-2 block text-sm font-medium text-heading" for="confirmPassword">Confirmar senha</label>
            <div class="relative">
              <span id="ic-lock2" class="pointer-events-none absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></span>
              <input id="confirmPassword" type="password" autocomplete="new-password" placeholder="••••••••" class="h-11 w-full rounded-lg border border-themed bg-gray-50 pl-10 pr-3 text-sm text-body placeholder-gray-400 outline-none focus:border-brand-300 dark:bg-gray-900" />
            </div>
            <p data-error="confirmPassword" class="mt-1.5 hidden text-xs text-error-500"></p>
          </div>

          <button id="submit-btn" type="submit" class="btn btn-brand flex h-11 w-full items-center justify-center rounded-lg bg-brand-500 text-sm font-medium text-white shadow-theme-xs transition hover:bg-brand-600 focus-ring disabled:cursor-not-allowed disabled:opacity-60">Redefinir senha</button>

          <p id="success-msg" class="hidden rounded-lg bg-success-50 px-4 py-2 text-center text-sm text-success-600 dark:bg-success-500/15 dark:text-success-500">Senha redefinida com sucesso! Redirecionando...</p>
        </form>
      </div>

      <p class="mt-6 text-center text-sm text-muted">
        <a href="login.html" class="font-medium text-brand-500 hover:text-brand-600">Voltar — Entrar</a>
      </p>
    </div>
  </div>

  <script>
    document.getElementById('ic-lock').innerHTML = icon('lock', { size: 26 });
    document.getElementById('ic-lock-pwd').innerHTML = icon('lock', { size: 18 });
    document.getElementById('ic-lock2').innerHTML = icon('lock', { size: 18 });
    document.getElementById('toggle-pwd').innerHTML = icon('eye', { size: 18 });

    // Read token from the query string (acknowledge it).
    const token = new URLSearchParams(window.location.search).get('token') || '';
    if (!token) {
      document.getElementById('invalid-token').classList.remove('hidden');
    }

    let showPwd = false;
    document.getElementById('toggle-pwd').addEventListener('click', () => {
      showPwd = !showPwd;
      document.getElementById('password').type = showPwd ? 'text' : 'password';
      document.getElementById('toggle-pwd').innerHTML = icon(showPwd ? 'eye-off' : 'eye', { size: 18 });
    });

    const STRENGTH = [
      { label: 'Muito fraca', bar: 'bg-error-500', text: 'text-error-500' },
      { label: 'Fraca', bar: 'bg-error-500', text: 'text-error-500' },
      { label: 'Razoável', bar: 'bg-warning-500', text: 'text-warning-500' },
      { label: 'Boa', bar: 'bg-success-500', text: 'text-success-500' },
      { label: 'Forte', bar: 'bg-success-500', text: 'text-success-500' },
    ];

    function passwordScore(pw) {
      let score = 0;
      if (pw.length >= 8) score++;
      if (/[A-Z]/.test(pw) && /[a-z]/.test(pw)) score++;
      if (/\d/.test(pw)) score++;
      if (/[^A-Za-z0-9]/.test(pw)) score++;
      return score;
    }

    const strengthWrap = document.getElementById('strength');
    const strengthLabel = document.getElementById('strength-label');
    const bars = Array.from(document.querySelectorAll('[data-bar]'));

    document.getElementById('password').addEventListener('input', (e) => {
      const pw = e.target.value;
      if (!pw) { strengthWrap.classList.add('hidden'); return; }
      strengthWrap.classList.remove('hidden');
      const score = passwordScore(pw);
      const info = STRENGTH[score];
      bars.forEach((bar, i) => {
        bar.className = 'h-1.5 flex-1 rounded-full transition-colors ' + (i < score ? info.bar : 'bg-gray-200 dark:bg-gray-700');
      });
      strengthLabel.className = 'text-xs font-medium ' + info.text;
      strengthLabel.textContent = 'Força da senha: ' + info.label;
    });

    function setError(field, msg) {
      const el = document.querySelector(`[data-error="${field}"]`);
      if (!el) return;
      if (msg) { el.textContent = msg; el.classList.remove('hidden'); }
      else { el.textContent = ''; el.classList.add('hidden'); }
    }

    document.getElementById('reset-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      let ok = true;

      if (!password) { setError('password', 'Informe uma senha'); ok = false; }
      else if (password.length < 8) { setError('password', 'A senha deve ter ao menos 8 caracteres'); ok = false; }
      else setError('password', null);

      if (!confirmPassword) { setError('confirmPassword', 'Confirme sua senha'); ok = false; }
      else if (confirmPassword !== password) { setError('confirmPassword', 'As senhas não conferem'); ok = false; }
      else setError('confirmPassword', null);

      if (!ok) return;

      const btn = document.getElementById('submit-btn');
      const success = document.getElementById('success-msg');
      btn.disabled = true;
      btn.innerHTML = '<span class="flex items-center gap-2"><span class="h-4 w-4 animate-spin rounded-full border-2 border-white/30 border-t-white"></span>Salvando...</span>';

      // token would be sent to the backend together with the new password
      void token;
      await new Promise((r) => setTimeout(r, 700));

      success.classList.remove('hidden');
      window.location.href = 'login.html';
    });
  </script>
</body>
</html>
