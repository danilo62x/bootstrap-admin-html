<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <title>Perfil — Admin Template</title>
  
  <link rel="stylesheet" href="assets/css/app.css" />
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/state.js"></script>
  <script src="assets/js/auth.js"></script>
  <script src="assets/js/icons.js"></script>
  <script src="assets/js/menu.js"></script>
</head>
<body>
  <div id="app">
    <div class="space-y-6">
      <section class="surface-card rounded-2xl border shadow-theme-sm p-5 md:p-6">
        <div class="flex flex-col items-center gap-6 md:flex-row md:items-start md:justify-between">
          <div class="flex flex-col items-center gap-4 md:flex-row md:items-center">
            <span id="avatar" class="flex h-20 w-20 items-center justify-center rounded-full bg-brand-500 text-2xl font-bold text-white shadow-theme-md">?</span>
            <div class="text-center md:text-left">
              <h1 id="user-name" class="text-xl font-semibold text-heading">Convidado</h1>
              <p id="user-role" class="text-sm text-muted">—</p>
              <p id="user-email" class="mt-1 text-xs text-muted"></p>
              <div class="mt-3 flex flex-wrap items-center justify-center gap-2 md:justify-start">
                <span class="inline-flex rounded-full bg-success-50 px-2 py-0.5 text-xs font-medium text-success-700 dark:bg-success-500/15 dark:text-success-500"><span class="mr-1 inline-flex h-2 w-2 self-center rounded-full bg-success-500"></span> Online</span>
                <span class="inline-flex rounded-full bg-brand-50 px-2 py-0.5 text-xs font-medium text-brand-700 dark:bg-brand-500/15 dark:text-brand-400">Premium</span>
              </div>
            </div>
          </div>
          <div class="flex gap-2">
            <button class="inline-flex h-10 items-center gap-2 rounded-lg border border-themed px-4 text-sm font-medium text-body hover:bg-gray-50 dark:hover:bg-gray-800">Mensagem</button>
            <button class="btn btn-brand inline-flex h-10 items-center gap-2 rounded-lg bg-brand-500 px-4 text-sm font-medium text-white shadow-theme-xs hover:bg-brand-600">Editar perfil</button>
          </div>
        </div>
      </section>

      <div class="grid grid-cols-1 gap-4 sm:grid-cols-3">
        <div class="surface-card rounded-2xl border p-5 shadow-theme-sm"><p class="text-xs text-muted">Pedidos</p><p class="mt-1 text-2xl font-bold text-heading">128</p></div>
        <div class="surface-card rounded-2xl border p-5 shadow-theme-sm"><p class="text-xs text-muted">Projetos</p><p class="mt-1 text-2xl font-bold text-heading">12</p></div>
        <div class="surface-card rounded-2xl border p-5 shadow-theme-sm"><p class="text-xs text-muted">Membro desde</p><p class="mt-1 text-2xl font-bold text-heading">2024</p></div>
      </div>

      <section class="surface-card rounded-2xl border shadow-theme-sm">
        <header class="border-b border-themed px-5 py-4 md:px-6"><h3 class="text-base font-semibold text-heading">Habilidades</h3></header>
        <div id="skills" class="space-y-4 p-5 md:p-6"></div>
      </section>
    </div>
  </div>

  <script src="assets/js/layout.js"></script>
  <script>
    const u = Auth.getUser();
    if (u) {
      const initials = u.name.split(' ').slice(0, 2).map((w) => w[0].toUpperCase()).join('');
      document.getElementById('avatar').textContent = initials;
      document.getElementById('user-name').textContent = u.name;
      document.getElementById('user-role').textContent = u.role;
      document.getElementById('user-email').textContent = u.email;
    }
    const SKILLS = [
      { name: 'Frontend / TypeScript', level: 92 },
      { name: 'Tailwind CSS', level: 88 },
      { name: 'UX & Product Design', level: 76 },
      { name: 'Node.js', level: 70 },
    ];
    document.getElementById('skills').innerHTML = SKILLS.map((s) => `
      <div>
        <div class="mb-1.5 flex items-center justify-between text-sm">
          <span class="font-medium text-heading">${s.name}</span>
          <span class="text-xs text-muted">${s.level}%</span>
        </div>
        <div class="h-2 overflow-hidden rounded-full bg-gray-100 dark:bg-gray-800">
          <div class="h-full rounded-full bg-brand-500" style="width: ${s.level}%"></div>
        </div>
      </div>`).join('');
  </script>
</body>
</html>
