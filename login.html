<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <title>Login — Admin Template</title>
  
  <link rel="stylesheet" href="assets/css/app.css" />
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/state.js"></script>
  <script src="assets/js/auth.js"></script>
  <script src="assets/js/icons.js"></script>
</head>
<body>
  <div class="relative flex min-h-screen items-center justify-center bg-gradient-to-br from-brand-50 via-white to-brand-100 px-4 dark:from-gray-900 dark:via-gray-dark dark:to-gray-900">
    <div class="absolute inset-0 -z-10 overflow-hidden">
      <div class="absolute -top-32 -right-32 h-96 w-96 rounded-full bg-brand-200/40 blur-3xl dark:bg-brand-500/10"></div>
      <div class="absolute -bottom-32 -left-32 h-96 w-96 rounded-full bg-warning-100/60 blur-3xl dark:bg-brand-700/10"></div>
    </div>

    <div class="w-full max-w-md">
      <div class="mb-6 flex flex-col items-center">
        <span class="flex h-14 w-14 items-center justify-center rounded-2xl bg-brand-500 text-white shadow-theme-md">
          <span class="text-2xl font-bold">A</span>
        </span>
        <h1 class="mt-5 text-title-sm font-bold text-heading">Bem-vindo de volta</h1>
        <p class="mt-2 text-sm text-muted">Faça login para acessar o painel</p>
      </div>

      <div class="surface-card rounded-2xl border p-6 shadow-theme-md md:p-8">
        <form id="login-form" class="space-y-5">
          <div>
            <label class="mb-2 block text-sm font-medium text-heading" for="email">Email</label>
            <div class="relative">
              <span id="ic-mail" class="pointer-events-none absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></span>
              <input id="email" type="email" required value="admin@template.com" placeholder="seu@email.com" class="h-11 w-full rounded-lg border border-themed bg-gray-50 pl-10 pr-3 text-sm text-body placeholder-gray-400 outline-none focus:border-brand-300 dark:bg-gray-900" />
            </div>
          </div>

          <div>
            <label class="mb-2 block text-sm font-medium text-heading" for="password">Senha</label>
            <div class="relative">
              <span id="ic-lock" class="pointer-events-none absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></span>
              <input id="password" type="password" required value="admin123" placeholder="••••••••" class="h-11 w-full rounded-lg border border-themed bg-gray-50 pl-10 pr-10 text-sm text-body placeholder-gray-400 outline-none focus:border-brand-300 dark:bg-gray-900" />
              <button type="button" id="toggle-pwd" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 dark:hover:text-gray-200"></button>
            </div>
          </div>

          <div class="flex items-center justify-between text-sm">
            <label class="flex items-center gap-2 text-body">
              <input type="checkbox" checked class="h-4 w-4 rounded border-gray-300 text-brand-500 focus:ring-brand-500 dark:border-gray-700 dark:bg-gray-800" />
              Lembrar-me
            </label>
            <a href="#" class="font-medium text-brand-500 hover:text-brand-600">Esqueceu a senha?</a>
          </div>

          <button id="submit-btn" type="submit" class="btn btn-brand flex h-11 w-full items-center justify-center rounded-lg bg-brand-500 text-sm font-medium text-white shadow-theme-xs transition hover:bg-brand-600 disabled:cursor-not-allowed disabled:opacity-60">Entrar</button>

          <p id="error-msg" class="hidden rounded-lg bg-error-50 px-4 py-2 text-center text-sm text-error-600 dark:bg-error-500/15 dark:text-error-500"></p>
        </form>

        <div class="mt-6 rounded-lg border border-dashed border-themed bg-gray-50/60 p-3 text-xs text-muted dark:bg-gray-900/40">
          <p class="font-medium text-body">Credenciais demo:</p>
          <p>admin@template.com / admin123</p>
          <p>user@template.com / user123</p>
        </div>
      </div>

      <p class="mt-6 text-center text-sm text-muted">
        Ainda não tem conta?
        <a href="#" class="font-medium text-brand-500 hover:text-brand-600">Criar conta</a>
      </p>
    </div>
  </div>

  <script>
    document.getElementById('ic-mail').innerHTML = icon('mail', { size: 18 });
    document.getElementById('ic-lock').innerHTML = icon('lock', { size: 18 });
    document.getElementById('toggle-pwd').innerHTML = icon('eye', { size: 18 });

    let showPwd = false;
    document.getElementById('toggle-pwd').addEventListener('click', () => {
      showPwd = !showPwd;
      document.getElementById('password').type = showPwd ? 'text' : 'password';
      document.getElementById('toggle-pwd').innerHTML = icon(showPwd ? 'eye-off' : 'eye', { size: 18 });
    });

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submit-btn');
      const err = document.getElementById('error-msg');
      err.classList.add('hidden');
      btn.disabled = true;
      btn.textContent = 'Entrando...';
      const ok = await Auth.login(document.getElementById('email').value, document.getElementById('password').value);
      btn.disabled = false;
      btn.textContent = 'Entrar';
      if (!ok) {
        err.textContent = 'Email ou senha incorretos';
        err.classList.remove('hidden');
        return;
      }
      const params = new URLSearchParams(window.location.search);
      window.location.href = params.get('redirect') || 'dashboard.html';
    });
  </script>
</body>
</html>
