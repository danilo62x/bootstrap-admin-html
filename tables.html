<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <title>Tabelas — Admin Template</title>
  
  <link rel="stylesheet" href="assets/css/app.css" />
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/state.js"></script>
  <script src="assets/js/auth.js"></script>
  <script src="assets/js/icons.js"></script>
  <script src="assets/js/menu.js"></script>
</head>
<body>
  <div id="app">
    <div class="space-y-6">
      <div>
        <h1 class="text-title-sm font-bold text-heading">Tabelas</h1>
        <p class="mt-1 text-sm text-muted">Listagens com filtros, paginação e seleção múltipla.</p>
      </div>

      <section class="surface-card rounded-2xl border shadow-theme-sm">
        <header class="flex items-center justify-between gap-3 border-b border-themed px-5 py-4 md:px-6">
          <div>
            <h3 class="text-base font-semibold text-heading">Pedidos</h3>
            <p class="mt-0.5 text-xs text-muted">Filtre por status e pesquise por cliente</p>
          </div>
          <div class="flex items-center gap-2">
            <input id="search" placeholder="Buscar..." class="form-control h-9 w-44 rounded-lg border border-themed bg-gray-50 px-3 text-sm text-body outline-none focus:border-brand-300 dark:bg-gray-900" />
            <select id="status-filter" class="form-select surface-card h-9 rounded-lg border border-themed bg-card-bg px-3 text-sm text-body outline-none focus:border-brand-300">
              <option value="">Todos</option>
              <option>Pago</option>
              <option>Pendente</option>
              <option>Cancelado</option>
            </select>
          </div>
        </header>
        <div class="overflow-x-auto p-5 md:p-6">
          <table class="w-full text-left text-sm">
            <thead class="border-b border-themed text-xs uppercase tracking-wide text-muted">
              <tr>
                <th class="w-12 py-3"><input type="checkbox" id="select-all" class="h-4 w-4 rounded border-gray-300 text-brand-500 focus:ring-brand-500" /></th>
                <th class="py-3 pr-4 font-medium">Pedido</th>
                <th class="py-3 pr-4 font-medium">Cliente</th>
                <th class="py-3 pr-4 font-medium">Valor</th>
                <th class="py-3 pr-4 font-medium">Status</th>
                <th class="py-3 pr-4 font-medium">Data</th>
                <th class="py-3 pr-4 text-right font-medium">Ações</th>
              </tr>
            </thead>
            <tbody id="rows" class="divide-y divide-themed"></tbody>
          </table>
        </div>
        <footer class="border-t border-themed px-5 py-3 text-xs text-muted md:px-6">
          Mostrando <span id="row-count">0</span> pedidos
        </footer>
      </section>
    </div>
  </div>

  <script src="assets/js/layout.js"></script>
  <script>
    const ROWS = [
      { id: '1', customer: 'Marina Costa', amount: '299,00', status: 'Pago', date: '25/05/2026' },
      { id: '2', customer: 'Lucas Pereira', amount: '79,00', status: 'Pendente', date: '24/05/2026' },
      { id: '3', customer: 'Aline Souza', amount: '299,00', status: 'Pago', date: '24/05/2026' },
      { id: '4', customer: 'Rafael Lima', amount: '1.290,00', status: 'Cancelado', date: '23/05/2026' },
      { id: '5', customer: 'Bianca Rocha', amount: '79,00', status: 'Pago', date: '22/05/2026' },
      { id: '6', customer: 'Pedro Alves', amount: '129,00', status: 'Pendente', date: '21/05/2026' },
      { id: '7', customer: 'Carla Mendes', amount: '299,00', status: 'Pago', date: '20/05/2026' },
    ];
    function statusClass(s) {
      if (s === 'Pago') return 'bg-success-50 text-success-700 dark:bg-success-500/15 dark:text-success-500';
      if (s === 'Pendente') return 'bg-warning-50 text-warning-700 dark:bg-warning-500/15 dark:text-warning-500';
      return 'bg-error-50 text-error-600 dark:bg-error-500/15 dark:text-error-500';
    }
    function render() {
      const q = document.getElementById('search').value.toLowerCase();
      const sf = document.getElementById('status-filter').value;
      const filtered = ROWS.filter((r) => (!q || r.customer.toLowerCase().includes(q)) && (!sf || r.status === sf));
      document.getElementById('rows').innerHTML = filtered.length ? filtered.map((r) => `
        <tr class="text-body">
          <td class="py-3"><input type="checkbox" class="h-4 w-4 rounded border-gray-300 text-brand-500 focus:ring-brand-500" /></td>
          <td class="py-3 pr-4 font-mono text-xs text-muted">#${r.id.padStart(5, '0')}</td>
          <td class="py-3 pr-4 font-medium text-heading">${r.customer}</td>
          <td class="py-3 pr-4">R$ ${r.amount}</td>
          <td class="py-3 pr-4"><span class="inline-flex rounded-full px-2.5 py-0.5 text-xs font-medium ${statusClass(r.status)}">${r.status}</span></td>
          <td class="py-3 pr-4 text-muted">${r.date}</td>
          <td class="py-3 pr-4">
            <div class="flex items-center justify-end gap-1">
              <button class="rounded-md p-1.5 text-muted hover:bg-gray-100 hover:text-brand-500 dark:hover:bg-gray-800">${icon('eye', { size: 16 })}</button>
              <button class="rounded-md p-1.5 text-muted hover:bg-gray-100 hover:text-brand-500 dark:hover:bg-gray-800">${icon('edit', { size: 16 })}</button>
              <button class="rounded-md p-1.5 text-muted hover:bg-error-50 hover:text-error-600 dark:hover:bg-error-500/15">${icon('trash', { size: 16 })}</button>
            </div>
          </td>
        </tr>`).join('') : '<tr><td colspan="7" class="py-8 text-center text-sm text-muted">Nenhum registro encontrado.</td></tr>';
      document.getElementById('row-count').textContent = filtered.length;
    }
    document.getElementById('search').addEventListener('input', render);
    document.getElementById('status-filter').addEventListener('change', render);
    render();
  </script>
</body>
</html>
