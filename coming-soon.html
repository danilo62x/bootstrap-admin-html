<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <title>Em breve — Admin Template</title>

  <link rel="stylesheet" href="assets/css/app.css" />
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/state.js"></script>
  <script src="assets/js/auth.js"></script>
  <script src="assets/js/icons.js"></script>
  <script src="assets/js/pwa.js"></script>
</head>
<body>
  <div class="relative flex min-h-screen items-center justify-center bg-gradient-to-br from-brand-50 via-white to-brand-100 px-4 dark:from-gray-900 dark:via-gray-dark dark:to-gray-900">
    <div class="absolute inset-0 -z-10 overflow-hidden">
      <div class="absolute -top-32 -right-32 h-96 w-96 rounded-full bg-brand-200/40 blur-3xl dark:bg-brand-500/10"></div>
      <div class="absolute -bottom-32 -left-32 h-96 w-96 rounded-full bg-warning-100/60 blur-3xl dark:bg-brand-700/10"></div>
    </div>

    <div class="w-full max-w-xl text-center">
      <span id="ic-rocket" class="mx-auto flex h-20 w-20 items-center justify-center rounded-2xl bg-brand-500 text-white shadow-theme-md"></span>

      <h1 class="mt-8 text-title-md font-bold text-heading">Em breve</h1>

      <p class="mx-auto mt-3 max-w-md text-sm text-muted">
        Estamos preparando algo incrível para você. Inscreva-se abaixo e seja o primeiro a saber
        quando lançarmos.
      </p>

      <div class="mt-8 grid grid-cols-4 gap-3">
        <div class="surface-card flex flex-col items-center rounded-2xl border px-2 py-4 shadow-theme-xs">
          <span id="cd-days" class="text-title-sm font-bold tabular-nums text-heading sm:text-title-md">00</span>
          <span class="mt-1 text-xs font-medium uppercase tracking-wide text-muted">Dias</span>
        </div>
        <div class="surface-card flex flex-col items-center rounded-2xl border px-2 py-4 shadow-theme-xs">
          <span id="cd-hours" class="text-title-sm font-bold tabular-nums text-heading sm:text-title-md">00</span>
          <span class="mt-1 text-xs font-medium uppercase tracking-wide text-muted">Horas</span>
        </div>
        <div class="surface-card flex flex-col items-center rounded-2xl border px-2 py-4 shadow-theme-xs">
          <span id="cd-minutes" class="text-title-sm font-bold tabular-nums text-heading sm:text-title-md">00</span>
          <span class="mt-1 text-xs font-medium uppercase tracking-wide text-muted">Minutos</span>
        </div>
        <div class="surface-card flex flex-col items-center rounded-2xl border px-2 py-4 shadow-theme-xs">
          <span id="cd-seconds" class="text-title-sm font-bold tabular-nums text-heading sm:text-title-md">00</span>
          <span class="mt-1 text-xs font-medium uppercase tracking-wide text-muted">Segundos</span>
        </div>
      </div>

      <form id="subscribe-form" class="mx-auto mt-8 flex w-full max-w-md flex-col gap-3 sm:flex-row">
        <div class="relative flex-1">
          <span id="ic-mail" class="pointer-events-none absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></span>
          <input id="subscribe-email" type="email" required placeholder="seu@email.com" class="h-11 w-full rounded-lg border border-themed bg-white pl-10 pr-3 text-sm text-body placeholder-gray-400 outline-none focus:border-brand-300 focus-ring dark:bg-gray-900" />
        </div>
        <button type="submit" class="btn btn-brand inline-flex h-11 items-center justify-center gap-2 rounded-lg bg-brand-500 px-6 text-sm font-medium text-white shadow-theme-xs transition hover:bg-brand-600 focus-ring">
          <span id="ic-bell"></span>
          Avise-me
        </button>
      </form>

      <p id="subscribe-success" class="hidden mx-auto mt-4 max-w-md rounded-lg bg-success-50 px-4 py-2 text-center text-sm font-medium text-success-600 dark:bg-success-500/15 dark:text-success-500">
        Você será avisado!
      </p>
    </div>
  </div>

  <script>
    document.getElementById('ic-rocket').innerHTML = icon('rocket', { size: 40 });
    document.getElementById('ic-mail').innerHTML = icon('mail', { size: 18 });
    document.getElementById('ic-bell').innerHTML = icon('bell', { size: 18 });

    // Alvo fixo: ~30 dias a partir do carregamento da página.
    var target = Date.now() + 30 * 24 * 60 * 60 * 1000;

    function pad(n) { return String(n).padStart(2, '0'); }

    function tick() {
      var diff = Math.max(0, target - Date.now());
      var totalSeconds = Math.floor(diff / 1000);
      document.getElementById('cd-days').textContent = pad(Math.floor(totalSeconds / 86400));
      document.getElementById('cd-hours').textContent = pad(Math.floor((totalSeconds % 86400) / 3600));
      document.getElementById('cd-minutes').textContent = pad(Math.floor((totalSeconds % 3600) / 60));
      document.getElementById('cd-seconds').textContent = pad(totalSeconds % 60);
    }

    tick();
    setInterval(tick, 1000);

    document.getElementById('subscribe-form').addEventListener('submit', function (e) {
      e.preventDefault();
      var success = document.getElementById('subscribe-success');
      success.classList.remove('hidden');
      document.getElementById('subscribe-email').value = '';
    });
  </script>
</body>
</html>
